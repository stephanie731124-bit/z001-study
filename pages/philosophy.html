{nm:'兵家·孫臏',cont:'<b>戰國</b>齊國軍師，孫武的後代。受同學龐涓陷害遭臏刑（去除膝蓋骨）。<br><b>著名戰役</b>：<br>①<b>桂陵之戰</b>（前 354 年）——「<b>圍魏救趙</b>」<br>②<b>馬陵之戰</b>（前 341 年）——「<b>減灶誘敵</b>」，逼龐涓自殺<br><b>代表作</b>：《<b>孫臏兵法</b>》（1972 年山東銀雀山漢墓出土，重見天日）',note:'圍魏救趙是著名軍事典故',st:2},
{nm:'縱橫家·蘇秦',cont:'<b>戰國洛陽人</b>。<b>合縱派</b>代表——說服六國（齊楚燕韓趙魏）聯合抗秦。<br>佩<b>六國相印</b>，是縱橫家最高榮譽。<br>後來合縱失敗被殺。',note:'合縱：南北聯合對抗秦國',st:2},
{nm:'縱橫家·張儀',cont:'<b>戰國魏國</b>人。<b>連橫派</b>代表——遊說六國分別與秦結盟，破壞合縱。<br>輔佐秦惠文王，使秦國連橫成功。',note:'連橫：與秦國結盟瓦解六國聯盟',st:2},
{nm:'縱橫家·鬼谷子',cont:'<b>戰國</b>傳說人物，姓王名詡。隱居鬼谷，故稱鬼谷子。<br>相傳是<b>蘇秦、張儀、孫臏、龐涓</b>的老師。<br>代表作：《鬼谷子》（縱橫之術）',note:'縱橫家始祖（傳說）',st:1},
{nm:'農家·許行',cont:'<b>戰國楚國</b>人。<b>農家</b>代表。<br><b>核心思想</b>：「<b>賢者與民並耕而食</b>」——主張君臣百姓平等共同耕作。<br>無傳世著作。孟子曾批評其思想。',note:'先秦最樸素的平等觀',st:1},
{nm:'雜家·呂不韋（？–前235）',cont:'<b>戰國衛國</b>商人，後成為秦國丞相，輔佐秦莊襄王和秦王政（後來的秦始皇）。<br><b>地位</b>：<b>雜家代表</b>——「兼儒墨，合名法」，集諸子百家於一書。<br><b>代表作</b>：《<b>呂氏春秋</b>》（又名《呂覽》）<br><b>典故</b>：「<b>一字千金</b>」——將《呂氏春秋》掛在咸陽城門，宣稱有人能改動一字賞千金<br><b>結局</b>：嫪毐之亂後被免相，後飲鴆自殺',note:'「一字千金」典故出處',st:2},
{nm:'小說家',cont:'先秦學派之一，「<b>街談巷議，道聽塗說</b>」之言。<br>「小說」一詞最早見於《<b>莊子·外物篇</b>》<br>無代表性著作流傳',note:'小說家≠後世小說家',st:1},

'liubian':[
{nm:'漢代經學·董仲舒（前179–前104）',cont:'<b>西漢</b>儒學代表。<br><b>主張</b>：<br>①向漢武帝建議「<b>罷黜百家，獨尊儒術</b>」→ 確立儒家為官方意識形態<br>②「<b>天人感應</b>」（天命與人事相通）<br>③「<b>三綱五常</b>」（君為臣綱、父為子綱、夫為妻綱；仁義禮智信）<br><b>代表作</b>：《<b>春秋繁露</b>》《天人三策》',note:'儒家從學派變成國家意識形態的關鍵人物。聯考高頻',st:3},
{nm:'漢代經學·今古文之爭',cont:'<b>今文經學</b>（用漢代隸書寫的儒家經典）vs <b>古文經學</b>（用秦以前文字寫的）<br>今文派強調「微言大義」，古文派注重訓詁考據<br><b>東漢鄭玄</b>（127–200）遍注群經，統一今古文，被稱為「鄭學」<br><b>東漢 79 年</b>白虎觀會議統一經學解釋（班固《白虎通義》記錄）',note:'漢代經學內部分歧',st:1},
{nm:'魏晉玄學',cont:'<b>魏晉時期</b>調和儒道的哲學潮流。<br><b>核心議題</b>：①有無之辨 ②名教與自然 ③言意之辨<br><b>代表人物</b>：<br>①<b>何晏</b>（？–249）：「貴無論」<br>②<b>王弼</b>（226–249）：玄學奠基人，注《老子》《周易》（24 歲早逝的天才）<br>③<b>嵇康</b>（223–262）：竹林七賢，「越名教而任自然」<br>④<b>阮籍</b>（210–263）：竹林七賢，《詠懷詩》<br>⑤<b>郭象</b>（252–312）：《莊子注》<br>玄學是「<b>魏晉風度</b>」的思想基礎',note:'玄學＝儒道結合。竹林七賢是文化代表',st:2},
{nm:'宋明理學·北宋五子',cont:'<b>北宋五位理學奠基者</b>：<br>①<b>周敦頤</b>（1017–1073，「濂溪先生」）：《太極圖說》「無極而太極」→ <b>宋明理學開山鼻祖</b><br>②<b>邵雍</b>（1011–1077，「邵康節」）：象數學<br>③<b>張載</b>（1020–1077，「橫渠先生」）：「氣一元論」「<b>為天地立心，為生民立命，為往聖繼絕學，為萬世開太平</b>」（橫渠四句）<br>④<b>程顥</b>（1032–1085，「明道先生」）：「天理」<br>⑤<b>程頤</b>（1033–1107，「伊川先生」）：「<b>存天理，滅人欲</b>」「格物致知」<br>程顥程頤兄弟合稱「<b>二程</b>」',note:'宋明理學的奠基期',st:2},
{nm:'宋明理學·朱熹（1130–1200）',cont:'<b>南宋</b>儒學集大成者，理學最重要的人物。<br><b>核心思想</b>：①理為本、氣為末 ②<b>格物致知</b>（窮究事物之理）③<b>存天理，滅人欲</b><br><b>主要貢獻</b>：編《<b>四書章句集注</b>》→ 元代起成為科舉標準教材→ 影響中國 700 年<br><b>歷史地位</b>：<b>程朱理學集大成者</b>。是孔子之後對中國思想影響最大的儒者。<br><b>代表作</b>：《四書章句集注》《朱子語類》《周易本義》<br><b>稱號</b>：「<b>朱子</b>」',note:'程朱理學的代表。元明清七百年的官方哲學',st:3},
{nm:'陸王心學·陸九淵（1139–1193）',cont:'<b>南宋</b>心學開創者，被稱為「<b>象山先生</b>」。<br><b>核心思想</b>：「<b>心即理</b>」「<b>宇宙便是吾心，吾心便是宇宙</b>」——理不在外物而在自心。<br><b>歷史事件</b>：與朱熹「<b>鵝湖之會</b>」辯論——理學 vs 心學的著名論戰<br><b>代表作</b>：《象山語錄》',note:'心學的開創者',st:2},
{nm:'陸王心學·王守仁（王陽明，1472–1529）',cont:'<b>明代</b>心學集大成者。本名王守仁，字伯安，號陽明。<br><b>核心思想</b>：<br>①「<b>心即理</b>」——理在心中，不在事物<br>②「<b>知行合一</b>」——知和行不可分<br>③「<b>致良知</b>」——人人本有良知，要去發掘<br>④「<b>事上磨練</b>」——在實踐中修養<br><b>歷史地位</b>：<b>心學集大成者</b>，立德立功立言「<b>三不朽</b>」典範。<br><b>代表作</b>：《<b>傳習錄</b>》《大學問》<br><b>「心學」傳到日本後對日本明治維新有重要影響</b>',note:'明代最重要的思想家。聯考高頻',st:3},
{nm:'明末清初啟蒙思潮',cont:'明亡清興時期，三位大儒反思君主專制：<br><b>① 黃宗羲（1610–1695）</b>：《<b>明夷待訪錄</b>》——批判君主專制「<b>天下為主，君為客</b>」「天下之大害者，君而已矣」<br><b>② 顧炎武（1613–1682）</b>：《<b>日知錄</b>》《天下郡國利病書》——「<b>經世致用</b>」「<b>天下興亡，匹夫有責</b>」<br><b>③ 王夫之（1619–1692）</b>：《讀通鑑論》《船山遺書》——樸素唯物主義「氣一元論」<br><b>合稱「明末清初三大思想家」</b>',note:'中國啟蒙思潮先驅。聯考高頻',st:3},
{nm:'清代考據學（樸學）',cont:'<b>清代</b>主流學風。反對宋明理學的空談，回歸漢代訓詁考據傳統。<br><b>代表人物</b>：戴震、段玉裁、王念孫、王引之、紀昀<br><b>特點</b>：注重文字、音韻、訓詁、版本、校勘，是純學術性研究<br><b>代表作</b>：紀昀主編《<b>四庫全書</b>》（清代最大的學術工程）',note:'乾嘉學派為代表',st:1},
{nm:'歷代學派流變總線',cont:'<b>先秦</b>諸子百家（儒墨道法名陰陽兵縱橫農雜）<br>↓<br><b>漢代</b>經學（董仲舒「罷黜百家獨尊儒術」，儒家官方化）<br>↓<br><b>魏晉</b>玄學（王弼竹林七賢，儒道結合）<br>↓<br><b>隋唐</b>佛學興盛（儒釋道三教並立）<br>↓<br><b>宋明</b>理學（北宋五子→朱熹程朱理學）<br>↓<br>陸王心學（陸九淵→王陽明）<br>↓<br><b>明末清初</b>啟蒙思潮（黃宗羲、顧炎武、王夫之）<br>↓<br><b>清代</b>考據學（乾嘉學派漢學復興）',note:'必背！理解學派演變的整體脈絡',st:3},

{nm:'道教重要人物',cont:'<b>葛洪（東晉）</b>：道教理論家+煉丹家。著《抱朴子》（內篇道教，外篇儒學）+《肘後備急方》（醫書）<br><br><b>陶弘景（南朝梁，456–536）</b>：道教茅山派宗師。隱居修道但備受梁武帝諮詢，被稱為「<b>山中宰相</b>」<br><br><b>王重陽（金代）</b>：創<b>全真道</b>（北方主流道派）。其弟子<b>丘處機</b>曾應成吉思汗之召前往西域<br><br><b>張三丰（傳說）</b>：明代道士，武當派祖師（傳說）',note:'全真道與正一道為道教兩大派',st:2},
