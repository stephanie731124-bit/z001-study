{nm:'先秦：世卿世祿',cont:'<b>西周</b>：天子之下設三公（<b>太師、太傅、太保</b>）輔政。官職由貴族世襲，父死子繼。<br><b>變革原因</b>：春秋戰國禮崩樂壞→各國變法打破世襲（如秦國軍功爵制）',note:'血緣決定一切',st:1},
{nm:'秦：三公九卿制',cont:'<b>秦始皇</b>確立。<br><b>三公</b>：<br>①<b>丞相</b>：百官之首，輔佐皇帝（行政首長）<br>②<b>太尉</b>：掌全國軍事（最高軍事長官，常虛設）<br>③<b>御史大夫</b>：副丞相，掌監察百官＋圖籍文書<br><br><b>九卿</b>：奉常（宗廟禮儀）、郎中令（宮殿警衛）、衛尉（宮門警衛）、太僕（車馬）、<b>廷尉</b>（司法刑獄）、典客（外交）、宗正（皇族）、治粟內史（財政）、少府（皇室財政手工業）<br><br><b>設計邏輯</b>：三公互相制約，最終決策權歸皇帝→確保皇權至高無上',note:'中央集權的開端框架',st:3},
{nm:'漢：內外朝制',cont:'<b>西漢武帝</b>時形成。<br><b>外朝</b>：以丞相為首的正式機構，處理日常政務<br><b>內朝</b>（中朝）：以大司馬大將軍、尚書等為核心的皇帝身邊顧問班子，參與機密決策<br><b>運作</b>：重大決策由內朝商議→皇帝裁決→交外朝執行<br><b>另設</b>：刺史（監察十三州地方）、司隸校尉（監察京師百官）<br><br><b>變革原因</b>：丞相權力過大（呂后時期擅權）→武帝設內朝架空丞相→削弱相權加強皇權',note:'皇權削弱相權的第一次大改革',st:3},
{nm:'隋唐：三省六部制',cont:'<b>隋文帝</b>確立，<b>唐代</b>完善。<br><b>三省</b>（決策＋審議＋執行）：<br>①<b>中書省</b>：<b>起草</b>詔令（長官中書令）—「出令」<br>②<b>門下省</b>：<b>審議</b>封駁詔令（長官侍中）—「封駁」（可退回不合理詔令）<br>③<b>尚書省</b>：<b>執行</b>政務（長官尚書令）—「執行」<br><br><b>六部</b>（尚書省下設）：<br>①<b>吏部</b>：官員任免考核（人事）<br>②<b>戶部</b>：戶籍田賦財政（財政）<br>③<b>禮部</b>：禮儀祭祀教育科舉（教育外交）<br>④<b>兵部</b>：軍政軍令（國防）<br>⑤<b>刑部</b>：刑法獄訟（司法）<br>⑥<b>工部</b>：營造水利屯田（建設）<br>口訣：<b>吏戶禮兵刑工</b><br><br><b>制度精髓</b>：相權一分為三，皇帝是最終裁決者',note:'中國官制的成熟形態。聯考超高頻',st:3},
{nm:'宋：二府三司制',cont:'<b>宋太祖</b>開始分化事權。<br><b>二府</b>：<br>①<b>中書門下</b>（政事堂）：掌行政，長官同平章事（宰相）。設<b>參知政事</b>分割相權（副宰相）<br>②<b>樞密院</b>：掌軍政，長官樞密使<br><b>三司</b>：<br>鹽鐵司+度支司+戶部司，掌財政，長官三司使（號稱「<b>計相</b>」）<br><br><b>另設</b>：諫院（諫官）、御史台（監察）<br><br><b>變革原因</b>：唐末五代藩鎮割據武將篡位教訓→「杯酒釋兵權」後行政/軍事/財政三權分立→相權大幅削弱',note:'行政軍事財政三分',st:3},
{nm:'元：中書省一省制',cont:'<b>元代</b>廢除三省，只設<b>中書省</b>統管全國政務（左右丞相主政）<br><b>樞密院</b>掌軍事、<b>御史台</b>掌監察<br><b>宣政院</b>：掌全國佛教事務和<b>西藏</b>地區軍政（首任由帝師兼任）—中央政府管理西藏的開始<br><br><b>變革原因</b>：蒙古統治者認為三省制效率低→簡化為一省。但一省制使丞相權力過大→明太祖因此廢除丞相',note:'宣政院＝中央管理西藏的起點',st:2},
{nm:'明：廢丞相·設內閣',cont:'<b>明太祖朱元璋</b>（1380）：以丞相<b>胡惟庸</b>謀反為由，<b>廢除丞相制度</b>（延續1600年的丞相制終結），六部直接向皇帝負責<br><br><b>明成祖朱棣</b>：設<b>內閣</b>作為皇帝的秘書顧問機構。入閣大臣稱「大學士」，協助處理奏章<br><br><b>內閣演變</b>：初期僅顧問→中後期權力漸大（如張居正時期實際執政）→但法定地位始終只是「顧問」非正式宰相<br><br><b>另設</b>：六科給事中（監察六部）、<b>錦衣衛/東廠/西廠</b>（特務機構監控百官）',note:'廢丞相是中國政治制度的重大轉折',st:3},
{nm:'清：軍機處',cont:'<b>雍正帝</b>（1729）設立<b>軍機處</b>。<br>原為處理西北軍務的臨時機構，後成為常設最高決策機構<br><br><b>軍機大臣</b>：由皇帝親選的親信大臣（通常3–7人），無固定任期，隨時可撤換<br><b>運作方式</b>：皇帝召見軍機大臣→口述旨意→軍機大臣擬寫諭旨→直接發出（「<b>廷寄</b>」繞過內閣和六部）<br><br><b>特點</b>：<br>①不是正式衙門（無官署印信）<br>②軍機大臣只能「<b>跪受筆錄</b>」<br>③決策效率極高但完全聽命於皇帝<br><br>標誌<b>君主專制達到頂峰</b>',note:'君主專制的最終形態',st:3},
{nm:'中央官制演變總線',cont:'<b>三公九卿</b>（秦漢丞相統攬）<br>↓<br><b>內外朝</b>（漢武帝用內朝架空丞相）<br>↓<br><b>三省六部</b>（隋唐相權一分為三）<br>↓<br><b>二府三司</b>（宋行政/軍事/財政三分）<br>↓<br><b>中書省一省制</b>（元集中但易專權）<br>↓<br><b>廢丞相設內閣</b>（明有實無名的顧問）<br>↓<br><b>軍機處</b>（清跪受筆錄皇權頂峰）<br><br><b>核心趨勢</b>：相權不斷被削弱→皇權不斷加強→君主專制達到頂峰',note:'必背！理解中國政治史的核心線',st:3},

{nm:'西周：分封制',cont:'天子將<b>土地和人民</b>分封給王族功臣和先代貴族，建立諸侯國<br><b>層級</b>：天子→諸侯→卿大夫→士<br><b>義務</b>：諸侯須向天子納貢、朝覲、出兵勤王<br><b>代表封國</b>：魯國（周公旦之子）、燕國（召公奭）、齊國（姜太公）、宋國（殷商後代）<br><b>特點</b>：諸侯在封地內有行政、軍事、財政自主權→中央對地方控制力有限<br><br><b>瓦解原因</b>：春秋戰國生產力發展（鐵犁牛耕）→經濟基礎變化→諸侯實力壯大不再服從天子→「禮崩樂壞」→秦統一後廢除',note:'血緣分封制的代表',st:3},
{nm:'秦：郡縣制',cont:'秦始皇統一六國後，廢除分封制，推行<b>郡縣制</b><br><b>結構</b>：全國設<b>36郡</b>（後增至40餘郡），郡下設縣<br><b>郡</b>：長官為<b>郡守</b>（行政）+<b>郡尉</b>（軍事）+<b>監御史</b>（監察）<br><b>縣</b>：長官為<b>縣令</b>（萬戶以上）或<b>縣長</b>（萬戶以下）<br><br><b>核心特點</b>：①官員由中央任命（非世襲）②可隨時撤換調動 ③中央直接控制地方<br><br><b>革命性意義</b>：從「封建親戚」（血緣分封）→中央派官管理（官僚行政）。是中國兩千年地方行政的基本框架',note:'中國地方行政的基本框架',st:3},
{nm:'漢初：郡國並行→推恩令',cont:'<b>西漢初</b>劉邦兼用兩制：中央直轄地區行郡縣制+分封功臣同姓子弟為諸侯王<br>王國內諸侯有獨立的行政、財政、軍事權→「尾大不掉」<br><br><b>七國之亂</b>（前154）：吳楚等七國叛亂→漢景帝平定後開始削藩<br><br><b>漢武帝推恩令</b>（前127）：規定諸侯王將封地分給所有兒子→王國越分越小→實質上瓦解了封國制<br><br><b>教訓</b>：分封必然導致地方割據→此後歷代基本不再大規模分封',note:'推恩令是高超的削藩策略',st:3},
{nm:'漢：州刺史→東漢州牧',cont:'<b>漢武帝</b>將全國劃為<b>13個州</b>（監察區），每州設<b>刺史</b>一人<br><b>刺史職責</b>：巡視監察郡守縣令（「以六條問事」），秩六百石（官小權重，以小制大）<br><br><b>東漢末</b>：刺史改稱<b>州牧</b>，權力擴大為集行政軍事於一身→州牧成為地方軍閥→導致東漢末群雄割據（如劉備領豫州牧、袁紹領冀州牧）<br><br><b>教訓</b>：監察官→行政軍事長官的轉變是地方割據的制度根源',note:'州牧制度直接催生三國',st:2},
{nm:'唐：道→藩鎮',cont:'<b>唐初</b>：全國劃為<b>10道</b>（後增至15道），道為監察區，設<b>按察使</b>巡視。州縣為基本行政單位<br><br><b>唐玄宗後</b>：邊疆設<b>節度使</b>統管軍政→安史之亂後節度使遍布全國→形成<b>藩鎮割據</b>局面（節度使擁兵自重，世襲罔替）→成為唐朝滅亡的直接原因<br><br><b>教訓</b>：地方軍政長官權力過大→必然走向割據。宋代「重文抑武」即吸取此教訓',note:'藩鎮割據導致唐亡',st:2},
{nm:'宋：路→知州（極端分權）',cont:'<b>宋代</b>吸取唐末藩鎮割據教訓，對地方實施全面分權：<br><br><b>路</b>：地方最高單位，但不設統一長官。設<b>四司</b>分管：<br>①<b>轉運使</b>（財政）<br>②<b>安撫使</b>（軍事）<br>③<b>提點刑獄使</b>（司法）<br>④<b>提舉常平使</b>（倉儲）<br>四權分立互不統屬<br><br><b>州</b>：長官<b>知州</b>由中央文官擔任（非武將）。另設<b>通判</b>監督知州（有權直接向皇帝報告）<br><br><b>另外</b>：地方精銳部隊收歸中央禁軍；地方財賦大部分上繳中央<br><br>結果：消除割據隱患，但造成「<b>冗官冗兵冗費</b>」和軍事積弱',note:'極端分權的代價是軍事積弱',st:3},
{nm:'元：行省制',cont:'<b>元代</b>在地方設<b>行中書省</b>（簡稱行省），是<b>中國省級行政區的起源</b><br>全國設<b>10個行省</b>+中書省直轄區（腹裡，今河北山東山西）+宣政院轄地（西藏）<br><br><b>行省長官</b>：丞相或平章政事，掌管一省的行政軍事財政<br><br><b>特點</b>：行省轄區面積廣大，常<b>跨越山川形勢</b>（犬牙交錯原則）→便於中央控制（使地方無法利用地形割據）<br><br><b>深遠影響</b>：行省制奠定了此後中國省級行政區劃的基本框架。明清沿用至今。「省」這個概念即源於元代',note:'行省制＝中國省制的起源',st:3},
{nm:'明清：省府縣三級',cont:'<b>明代</b>：廢行省，改設<b>三司</b>分管：<br>①布政使司（行政財政，長官布政使）<br>②按察使司（監察司法，長官按察使）<br>③都指揮使司（軍事，長官都指揮使）<br>三司互不統屬→後因需要統一協調，逐漸設<b>巡撫</b>（文官）總管一省→清代巡撫成為固定的省級長官<br><br><b>清代</b>：巡撫（一省長官）之上設<b>總督</b>（管轄一至三省，偏重軍事）。基層為<b>省→府→縣</b>三級',note:'巡撫總督是清代地方治理的核心',st:2},
{nm:'清：邊疆管理',cont:'<b>改土歸流</b>（雍正大規模推行）：取消西南少數民族地區的土司世襲制度，改派中央委任的「流官」→加強中央對西南的直接統治。<b>2021年聯考材料題原題</b><br><br><b>駐藏大臣</b>（1727設）：代表中央監督管理西藏事務<br><b>伊犁將軍</b>（1762設）：管轄新疆天山南北<br><b>設台灣府</b>（1684）：施琅收台後歸福建管轄<br><b>理藩院</b>：管理蒙古、西藏、新疆等少數民族事務<br><br>2026新大綱強調「<b>中華民族多元一體</b>」，清代邊疆管理是核心內容',note:'超高頻。對應2026新大綱方向',st:3},
{nm:'地方行政演變總線',cont:'<b>分封制</b>（西周血緣世襲）<br>↓<br><b>郡縣制</b>（秦中央任命）<br>↓<br><b>郡國並行</b>（漢初→推恩令瓦解）<br>↓<br><b>州郡縣</b>（東漢州牧軍閥化）<br>↓<br><b>道州縣</b>（唐節度使藩鎮割據）<br>↓<br><b>路州縣</b>（宋極端分權文官治國）<br>↓<br><b>行省制</b>（元省級行政起源）<br>↓<br><b>省府縣</b>（明清巡撫總督制）<br><br><b>核心趨勢</b>：中央對地方控制不斷加強；地方官由世襲→任命→可撤換',note:'必背',st:3},

{nm:'先秦著名戰役',cont:'<b>牧野之戰</b>（前1046）：周武王 vs 商紂王。商軍倒戈，紂王自焚<br><br><b>長勺之戰</b>（前684）：曹劌「<b>一鼓作氣</b>」，魯以少勝多<br><br><b>城濮之戰</b>（前632）：晉文公 vs 楚。「<b>退避三舍</b>」，晉文公成霸<br><br><b>桂陵之戰</b>（前354）：齊（孫臏）vs 魏（龐涓）。<b>圍魏救趙</b>，齊勝<br><br><b>馬陵之戰</b>（前341）：齊（孫臏）vs 魏（龐涓）。<b>減灶誘敵</b>，龐涓自殺<br><br><b>長平之戰</b>（前260）：秦（白起）vs 趙（趙括）。<b>紙上談兵</b>，秦坑殺趙軍40萬，戰國規模最大',note:'先秦戰役多典故',st:3},
{nm:'秦漢著名戰役',cont:'<b>巨鹿之戰</b>（前207）：項羽 vs 秦軍主力。<b>破釜沉舟</b>，項羽以少勝多殲秦主力<br><br><b>垓下之戰</b>（前202）：劉邦（韓信）vs 項羽。<b>十面埋伏、四面楚歌</b>，項羽烏江自刎，楚漢戰爭結束<br><br><b>昆陽之戰</b>（23年）：劉秀 vs 王莽軍。劉秀以1萬大破42萬，新莽滅亡<br><br><b>官渡之戰</b>（200）：曹操 vs 袁紹。以少勝多，曹操統一北方基礎<br><br><b>赤壁之戰</b>（208）：孫劉聯軍 vs 曹操。火攻大敗曹操，三國鼎立',note:'秦漢戰役都是典故源頭',st:3},

{nm:'歷代名將',cont:'<b>春秋</b>：孫武、吳起<br><b>戰國</b>：戰國四大名將——<b>白起</b>（殺神，長平坑趙）、<b>王翦</b>（滅楚）、<b>李牧</b>（破匈奴）、<b>廉頗</b>（負荊請罪）<br><b>秦</b>：蒙恬（北擊匈奴、修長城）<br><b>西漢</b>：<b>韓信</b>（兵仙「國士無雙」）、<b>衛青、霍去病</b>（北擊匈奴）<br><b>東漢</b>：<b>班超</b>（經營西域30年）<br><b>三國</b>：關羽、張飛、趙雲、周瑜、呂蒙<br><b>唐</b>：<b>李靖</b>（滅東突厥）、<b>郭子儀</b>（平安史之亂）<br><b>北宋</b>：<b>楊業</b>（楊家將）<br><b>南宋</b>：<b>岳飛</b>（抗金「精忠報國」）、韓世忠<br><b>明</b>：<b>徐達、戚繼光</b>（抗倭）、<b>袁崇煥</b>（抗清）<br><b>清</b>：<b>施琅</b>（收台灣）、<b>左宗棠</b>（收新疆）',note:'名將是文化常識',st:2},

{nm:'傳統節日',cont:'<b>春節</b>（正月初一）：歲首。貼春聯、吃年夜飯、放鞭炮、發壓歲錢<br><b>元宵節</b>（正月十五）：上元節、燈節。賞燈、猜燈謎、吃元宵<br><b>清明節</b>（4月5日前後）：掃墓祭祖、踏青、插柳<br><b>端午節</b>（五月初五）：紀念<b>屈原</b>。賽龍舟、吃粽子、掛艾草菖蒲、佩香囊。<b>2009年入選聯合國非遺</b><br><b>七夕節</b>（七月初七）：牛郎織女鵲橋相會。乞巧節，中國情人節<br><b>中元節</b>（七月十五）：祭祖、放河燈<br><b>中秋節</b>（八月十五）：團圓節。賞月、吃月餅。源自嫦娥奔月傳說<br><b>重陽節</b>（九月初九）：登高、賞菊、敬老、佩茱萸<br><b>冬至</b>：吃餃子（北方）、湯圓（南方）<br><b>臘八節</b>（臘月初八）：喝臘八粥',note:'端午、中秋、清明、春節是高頻',st:3},

{nm:'古代服飾·官服',cont:'<b>漢服</b>：漢族傳統服飾。基本形制：上衣下裳、深衣、曲裾、直裾。<b>交領右衽</b>（左衣襟壓右衣襟）為漢族特徵<br><br><b>旗袍</b>：源自滿族旗裝，民國時期改良為修身款式，成為中國女性代表服飾<br><br><b>龍袍</b>：皇帝專用，繡有九條龍。<b>明黃色</b>為皇帝專屬色<br><br><b>明清官服等級</b>：以「<b>補子</b>」（胸前方形織物）區分品級<br>•<b>文官繡禽鳥</b>（一品仙鶴、二品錦雞、三品孔雀……）<br>•<b>武官繡猛獸</b>（一品麒麟、二品獅子、三品豹……）<br>口訣：<b>文禽武獸</b>',note:'交領右衽、文禽武獸是文化常識',st:2},
