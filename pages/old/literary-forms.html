var curCat='timeline';

function oM(catId,idx){var cat;for(var i=0;i<TABS.length;i++){if(TABS[i].id===catId){cat=TABS[i];break;}}var it=DATA[catId][idx];var freq=['','偶考','常考','必考高頻'][it.st];var h='<button class="cb" onclick="cM()">\u00d7</button>';h+='<h3>'+it.nm+'</h3>';h+='<span class="mt" style="background:'+cat.bg+';color:'+cat.tx+'">'+cat.n+'</span>';h+='<span class="mt" style="background:#FAEEDA;color:#633806"><span class="star">'+'\u2605'.repeat(it.st)+'</span> '+freq+'</span>';h+='<div class="row"><div class="label">\u5167\u5bb9</div><div class="val">'+it.cont+'</div></div>';if(it.note)h+='<div class="row"><div class="label">\u8003\u8a66\u5099\u8a3b</div><div class="val" style="color:#555">'+it.note+'</div></div>';document.getElementById('mc').innerHTML=h;document.getElementById('ov').className='ov show';}
