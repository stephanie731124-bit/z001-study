{nm:'列強資本輸出',cont:'<b>時間</b>：甲午戰爭後（1895年以後）<br><b>背景</b>：《馬關條約》允許列強在通商口岸設廠→由商品輸出轉向資本輸出<br><b>主要形式</b>：<br>① 投資鐵路（京漢鐵路、津浦鐵路、滇越鐵路等被列強控制）<br>② 開礦（開平煤礦被英商奪取等）<br>③ 設廠（紡織、繅絲等）<br>④ 借款給清政府（控制中國財政）<br><b>影響</b>：列強對中國的經濟控制更深；客觀上瓦解了自然經濟，為民族資本主義發展創造了條件',note:'資本輸出是帝國主義對華經濟侵略的高級形式',st:1},

{nm:'開眼看世界·林則徐魏源',cont:'<b>「開眼看世界」第一人</b>：<b>林則徐</b>——禁煙時組織編譯<b>《四洲志》</b>（最早系統介紹世界地理）。<br><b>魏源</b>：在《四洲志》基礎上編成<b>《海國圖志》</b>（1843）——當時最詳備的世界史地著作。<br><b>核心思想</b>：「<b>師夷長技以制夷</b>」——學習西方技術來抵禦西方侵略。<br><b>意義</b>：是中國近代<b>學習西方</b>思潮的先聲（停留在「器物」層面）。',note:'《海國圖志》在日本影響極大，成為明治維新的重要參考',st:3},
{nm:'中體西用·洋務派思想',cont:'<b>「中學為體，西學為用」</b>：洋務派的指導思想。<br><b>提出</b>：<b>馮桂芬</b>最早雛形（《校邠廬抗議》），<b>張之洞</b>《勸學篇》正式系統闡述。<br><b>含義</b>：以中國的綱常名教為根本（體），以西方的科技為實用工具（用）。<br><b>本質</b>：<b>只學技術不學制度</b>——維護封建統治＋吸收西方科技。<br><b>侷限</b>：甲午戰敗證明只學技術不行→催生了維新派（學制度）',note:'是洋務運動的理論基礎，也是其失敗的根源',st:3},
{nm:'早期維新派',cont:'<b>時間</b>：19世紀70–80年代<br><b>代表</b>：<b>王韜</b>、<b>鄭觀應</b>（《盛世危言》）、馮桂芬<br><b>主張</b>：在學西方技術的基礎上，進一步主張<b>學西方政治制度</b>（君主立憲）和<b>發展資本主義工商業</b><br><b>歷史地位</b>：是維新派思想的先驅',note:'早期維新派是「器物」到「制度」的過渡',st:1},
{nm:'維新派思想（戊戌變法）',cont:'從「<b>學技術</b>」到「<b>學制度</b>」的飛躍——主張君主立憲制。<br><b>代表人物及著作</b>：<br>• <b>康有為</b>：《<b>新學偽經考</b>》《<b>孔子改制考</b>》——<b>托古改制</b>（借孔子的旗號宣傳變法）<br>• <b>梁啟超</b>：《<b>變法通議</b>》——「變者天下之公理也」<br>• <b>嚴復</b>：翻譯赫胥黎《天演論》——「<b>物競天擇，適者生存</b>」「世道必進，後勝於今」<br>• <b>譚嗣同</b>：《<b>仁學</b>》——「衝決網羅」，反對封建綱常名教<br><b>歷史意義</b>：第一次思想啟蒙運動。傳播了民主思想，動搖了封建專制',note:'嚴復《天演論》在當時知識界引起轟動，影響巨大',st:3},
{nm:'革命派思想',cont:'主張用<b>暴力革命</b>推翻清政府，建立共和國。<br><b>代表人物</b>：<br>• <b>孫中山</b>：<b>三民主義</b>（民族民權民生）——資產階級民主革命綱領<br>• <b>章太炎</b>（章炳麟）：《駁康有為論革命書》<br>• <b>鄒容</b>：《<b>革命軍</b>》——「中國少年自由獨立之歌」<br>• <b>陳天華</b>：《<b>猛回頭</b>》《<b>警世鐘</b>》——通俗易懂的宣傳冊<br><b>論戰</b>：1905–1907年革命派與保皇派（維新派轉變而來）大論戰，最終革命派思想占主流',note:'革命派主張比維新派更徹底——推翻而非改革',st:2},
{nm:'新文化運動（1915–1919）',cont:'<b>背景</b>：辛亥革命後袁世凱尊孔復古→先進知識分子認識到要從思想文化層面進行徹底變革。<br><b>開始標誌</b>：1915年<b>陳獨秀</b>在上海創辦<b>《青年雜誌》</b>（後改名《新青年》）<br><b>兩面旗幟</b>：<b>民主</b>（德先生 Democracy）、<b>科學</b>（賽先生 Science）<br><b>主要陣地</b>：<b>北京大學</b>（蔡元培任校長，「兼容並包，思想自由」）<br><b>代表人物</b>：陳獨秀、<b>李大釗</b>、<b>胡適</b>、<b>魯迅</b>、錢玄同、劉半農<br><b>主要內容</b>：<br>① 提倡民主科學，反對專制迷信<br>② 提倡新道德，反對舊禮教（「打倒孔家店」）<br>③ <b>文學革命</b>：胡適《文學改良芻議》（1917，提倡白話文）→陳獨秀《文學革命論》<br>④ <b>魯迅《狂人日記》</b>（1918）：中國<b>第一篇白話小說</b>，揭露封建禮教「吃人」本質<br><b>後期</b>（五四運動後）：傳播<b>馬克思主義</b>（李大釗《我的馬克思主義觀》）',note:'<b>意義</b>：第二次思想啟蒙運動。從根本上動搖了封建思想的統治地位',st:3},

{nm:'服飾變遷',cont:'<b>清末</b>：男子長袍馬褂、女子上衣下裙（旗袍前身）<br><b>民國</b>：<br>① <b>中山裝</b>（孫中山設計）——融合中西，成為民國男士標準服裝。四個口袋象徵「禮義廉恥」，五粒鈕扣象徵五權憲法<br>② <b>旗袍</b>——由滿族旗裝改良而來，民國女性最具代表性的服裝<br>③ 西裝在通商口岸流行<br>④ 學生裝、軍裝風格的服裝興起',note:'中山裝＝民國男裝符號；旗袍＝民國女裝符號',st:2},
{nm:'飲食變遷',cont:'<b>傳統</b>：以米飯麵食為主，地域差異大（八大菜系）<br><b>變化</b>：<br>① <b>西餐</b>傳入通商口岸（上海、廣州、天津等地出現西餐廳）<br>② <b>西式糕點、咖啡、可可、洋酒</b>等進入中國<br>③ 部分外國食品本土化（如「上海羅宋湯」）<br>④ 餐桌禮儀和飲食習慣的中西合璧',note:'上海等通商口岸是中西飲食交融的前沿',st:1},
{nm:'交通變革',cont:'<b>傳統</b>：馬車、轎子、人力車、帆船<br><b>近代新式交通</b>：<br>① <b>火車</b>：1876年英國人擅自修建吳淞鐵路（後被清政府拆除）；1881年中國第一條自建鐵路<b>唐胥鐵路</b>；<b>京張鐵路</b>（1909年詹天佑主持，中國人完全自主設計修建的第一條鐵路）<br>② <b>輪船</b>：1872年李鴻章創辦<b>輪船招商局</b>，打破列強對中國航運的壟斷<br>③ <b>汽車</b>：清末傳入<br>④ <b>電車</b>：1908年上海第一條有軌電車<br>⑤ <b>飛機</b>：民國時期傳入',note:'<b>詹天佑</b>＝中國鐵路之父，京張鐵路「人字形」設計世界聞名',st:2},
{nm:'通訊與媒體',cont:'<b>通訊</b>：<br>① <b>電報</b>：1877年福建巡撫沈葆楨在台灣架設電報線（中國最早電報線路）<br>② <b>電話</b>：1882年外國人在上海開設電話公司<br>③ <b>郵政</b>：1896年清政府設大清郵政<br><b>報刊媒體</b>：<br>① <b>《申報》</b>（1872年上海創刊，存在最久的中文報紙，1949年停刊）<br>② <b>《新青年》</b>（1915）——新文化運動主陣地<br>③ <b>商務印書館</b>（1897，上海，最早的現代出版機構）<br>④ <b>中華書局</b>（1912）',note:'《申報》是研究近代史的重要史料來源',st:2},
{nm:'習俗變革',cont:'<b>剪辮</b>：辛亥革命後民國政府明令剪辮（清朝強制留辮的標誌被打破）<br><b>廢纏足</b>：民國禁止纏足，解放女性的雙足<br><b>禁鴉片</b>：清末民國持續禁煙運動<br><b>廢跪拜</b>：禮節改為鞠躬、握手<br><b>稱呼變革</b>：用「先生」「君」「同志」取代「老爺」「大人」<br><b>婚姻自由</b>：反對父母包辦、主張自由戀愛<br><b>新式婚禮</b>：穿婚紗禮服，舉行新式婚禮',note:'這些變革反映了民主、平等、自由觀念的傳播',st:2},
{nm:'教育變革',cont:'<b>1905年廢除科舉</b>：延續1300年的科舉制度終結，新式學堂大量興辦。<br><b>京師大學堂</b>（1898年戊戌變法時設立）→1912年改名為<b>北京大學</b>（蔡元培任校長後成為新文化運動中心）<br><b>新式學堂三級制</b>：小學堂→中學堂→大學堂<br><b>留學潮</b>：<br>① 留日（甲午戰後最多，因為近、便宜、漢字相近）<br>② 留美（庚款留學生計畫）<br>③ 留歐（一戰前後赴英法德）<br>④ 留俄（十月革命後赴蘇聯）<br><b>女子教育</b>：女子也可上學，1907年清政府頒布女學章程',note:'近代教育的特點：從讀經書→學科學；從科舉→現代學制',st:2},
],

{nm:'袁世凱與北洋政府（1912–1916）',cont:'<b>袁世凱竊國</b>：1912年3月在北京就任臨時大總統→1913年解散國民黨→1914年解散國會→1915年12月稱帝（國號「中華帝國」）<br><b>護國運動</b>（1915–1916）：<b>蔡鍔</b>、唐繼堯、李烈鈞在雲南起義反袁→袁世凱被迫取消帝制→1916年6月病死<br><b>「二十一條」</b>（1915年5月）：日本趁一戰爆發向袁世凱政府提出滅亡中國的條約。袁政府為換取日本支持稱帝大部分簽署→引發全國反日浪潮',note:'袁世凱是民國初年的關鍵人物，從革命到復辟都離不開他',st:2},
{nm:'軍閥混戰時期（1916–1928）',cont:'袁世凱死後北洋軍閥分裂為多個派系：<br><b>三大派系</b>：<br>• <b>直系</b>：馮國璋、曹錕、吳佩孚（依靠英美）<br>• <b>皖系</b>：段祺瑞（依靠日本）<br>• <b>奉系</b>：張作霖、張學良（依靠日本）<br><b>地方軍閥</b>：滇系（唐繼堯）、桂系（陸榮廷）、晉系（閻錫山）<br><b>主要事件</b>：<br>• 二次革命（1913，反袁失敗）<br>• 護國運動（1915–1916）<br>• 護法運動（1917，孫中山在廣州）<br>• 直皖戰爭（1920）、直奉戰爭（1922、1924）',note:'軍閥混戰是中國最混亂黑暗的時期',st:2},
{nm:'五四運動（1919）',cont:'<b>導火索</b>：<b>巴黎和會</b>中國外交失敗——作為一戰戰勝國，中國要求收回德國在山東的權益，卻被列強拒絕並轉交給日本。<br><b>過程</b>：<br>① <b>1919年5月4日</b>北京3000多名學生在天安門前集會抗議，提出「外爭主權，內除國賊」「廢除二十一條」「拒絕在和約上簽字」<br>② 學生罷課→蔓延全國→上海工人罷工、商人罷市（「三罷」）→<b>工人階級首次登上歷史舞台</b><br>③ 北洋政府被迫釋放被捕學生、罷免賣國賊曹汝霖等三人、拒絕在巴黎和約上簽字<br><b>意義</b>：<br>① 反帝反封建的徹底愛國運動<br>② 是<b>新民主主義革命的開端</b>（工人階級登台、馬克思主義傳播）<br>③ 標誌新文化運動進入新階段',note:'五四運動是中國近現代史的重大分水嶺',st:3},
{nm:'中共成立與第一次國共合作',cont:'<b>中國共產黨成立</b>（<b>1921年7月</b>）：<br>• 中共一大在上海法租界召開→因租界巡捕注意轉移到浙江嘉興南湖紅船<br>• 出席代表13人，代表全國50多名黨員<br>• 主要創始人：<b>陳獨秀</b>（首任總書記）、<b>李大釗</b>、毛澤東、董必武等<br><b>第一次國共合作</b>（1924–1927）：<br>• 1924年國民黨「一大」在廣州召開→確立「<b>聯俄、聯共、扶助農工</b>」三大政策<br>• 創辦<b>黃埔軍校</b>（蔣介石任校長，周恩來任政治部主任）<br>• <b>北伐戰爭</b>（1926–1928）：從廣東出發北伐→消滅吳佩孚、孫傳芳→佔領武漢、南京、上海<br>• <b>1927年</b>蔣介石發動「四一二政變」屠殺共產黨人→國共合作破裂',note:'中共成立是「開天闢地的大事變」',st:3},
