var curTab='phil';
function switchTab(id){curTab=id;renderTabs();renderContent();}
function renderTabs(){
var h='';
for(var i=0;i<TABS.length;i++){var t=TABS[i];var cls=curTab===t.id?'tab on':'tab';var sty=curTab===t.id?'background:'+t.color:'';
h+='<button class="'+cls+'" style="'+sty+'" onclick="switchTab(\''+t.id+'\')">'+t.n+'</button>';}
document.getElementById('tabs').innerHTML=h;}
function renderContent(){
var tab;for(var i=0;i<TABS.length;i++){if(TABS[i].id===curTab){tab=TABS[i];break;}}
var eras=DATA[curTab]||[];var h='<div class="tl">';
for(var ei=0;ei<eras.length;ei++){var era=eras[ei];
h+='<div class="eb"><div class="ed" style="background:'+era.dot+'"></div>';
h+='<div class="el">'+era.era+'<span class="yr">'+era.yr+'</span></div><div class="cds">';
for(var ci=0;ci<era.items.length;ci++){var it=era.items[ci];var nw=it.nw?'<span class="new">新</span>':'';
var stars='\u2605'.repeat(it.st);
h+='<div class="cd" style="background:'+tab.bg+';color:'+tab.tx+'" onclick="openM(\''+curTab+'\','+ei+','+ci+')">';
h+='<div class="nm"><span class="star">'+stars+'</span> '+it.nm+nw+'<span class="wh">'+it.when+'</span></div>';
h+='<div class="br">'+it.br+'</div>';
if(it.conn)h+='<div class="lk"><b>↕</b> 有承傳關係</div>';
h+='</div>';}h+='</div></div>';}h+='</div>';
document.getElementById('content').innerHTML=h;}
function openM(tabId,ei,ci){
var tab;for(var i=0;i<TABS.length;i++){if(TABS[i].id===tabId){tab=TABS[i];break;}}
var era=DATA[tabId][ei];var it=era.items[ci];
var freq=['','偶考','常考，需熟練掌握','必考高頻'][it.st];
var nw=it.nw?'<span class="new">新增</span>':'';
var h='<button class="cb" onclick="closeM()">\u00d7</button>';
h+='<h3>'+it.nm+nw+'</h3>';
h+='<span class="mt" style="background:'+tab.bg+';color:'+tab.tx+'">'+tab.n+'</span>';
h+='<span class="mt" style="background:#f0f0f0;color:#333">'+it.when+'</span>';
h+='<span class="mt" style="background:#FAEEDA;color:#633806"><span class="star">'+'\u2605'.repeat(it.st)+'</span> '+freq+'</span>';
h+='<div class="mb">'+it.det+'</div>';
if(it.conn)h+='<div class="cn"><b>↕ 承傳脈絡</b><br>'+it.conn+'</div>';
h+='<div class="tp"><b>備考提示：</b>'+freq+'。'+(it.nw?'此為依2026考試指南新補充。':'')+'</div>';
document.getElementById('mc').innerHTML=h;document.getElementById('ov').className='ov show';}
function closeM(){document.getElementById('ov').className='ov';}
renderTabs();renderContent();
