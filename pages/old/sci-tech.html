{nm:'活字印刷',cont:'<b>北宋</b>畢昇（約970–1051），約1040年代發明<b>膠泥活字印刷術</b>。沈括《夢溪筆談》詳細記載其方法。元代王禎改進為木活字並發明轉輪排字架。比歐洲古騰堡（1450s）早約<b>400年</b>。',note:'畢昇＋沈括記載＋早400年',st:3},
{nm:'火藥',cont:'<b>唐代</b>煉丹家在煉丹過程中偶然發現硝石、硫磺、木炭混合後可以燃燒爆炸。<b>唐末</b>開始用於軍事（火箭、火炮）。<b>宋代</b>廣泛軍事應用（突火槍、震天雷等）。13世紀經阿拉伯傳入歐洲。',note:'煉丹→軍事的轉化過程',st:2},
{nm:'指南針',cont:'<b>戰國</b>：天然磁石製成<b>司南</b>（最早指南儀器，勺形置於光滑銅盤上）。<br><b>北宋</b>：沈括《夢溪筆談》記載用磁針指南的方法。磁針指南針開始應用於<b>航海</b>。<br>12–13世紀傳入阿拉伯和歐洲，推動<b>大航海時代</b>。',note:'司南（戰國）→磁針（北宋）→航海→傳歐洲',st:3},
{nm:'《夢溪筆談》',cont:'<b>北宋</b>沈括（1031–1095）著。26卷609條。涉及天文、數學、物理、化學、生物、地質、醫學等多個領域。首次記載畢昇活字印刷、磁針指南等。英國李約瑟稱為<b>「中國科學史上的里程碑」</b>。',note:'百科全書式著作。記載了多項重大發明',st:3},
{nm:'《天工開物》',cont:'<b>明代</b>宋應星（1587–約1666）著。記錄農業和手工業<b>30類生產技術300餘項</b>。涵蓋製鹽、冶鐵、紡織、陶瓷、造紙、兵器等。被譽為<b>「17世紀的工藝百科全書」</b>。',note:'三大科學巨著之一',st:2},
{nm:'秦軍兵器標準化',cont:'<b>秦代</b>兵器實行標準化生產：弩機部件可互換（零件通用），箭頭含鉛毒增加殺傷力。體現秦代先進的軍工管理和質量控制體系。',note:'出土兵馬俑和兵器證實',st:1},
{nm:'馬鈞（三國魏）',cont:'被譽為「天下之名巧」。改良織綾機（效率提高4–5倍）。發明<b>指南車</b>（機械定向裝置，非磁性）和<b>翻車</b>（龍骨水車，灌溉工具）。',note:'指南車≠指南針（指南車是機械齒輪裝置）',st:1},
{nm:'諸葛亮發明',cont:'<b>蜀漢</b>丞相。發明<b>木牛流馬</b>（蜀道山地運糧工具）、改進<b>連弩</b>（一弩十矢俱發，即諸葛連弩）。',note:'軍事後勤技術創新',st:1},
{nm:'唐三彩',cont:'<b>唐代</b>低溫釉陶器。以黃、綠、白（或褐）三色為主。主要用於<b>隨葬</b>，非日常器皿。代表唐代陶瓷工藝水平。',note:'注意：唐三彩是「陶器」不是「瓷器」',st:1},
{nm:'《營造法式》',cont:'<b>北宋</b>李誡編修（1100年成書）。詳細規定建築標準與工藝。是中國古代最重要的<b>建築技術著作</b>。',note:'考試指南「建築」考點的技術延伸',st:1},
{nm:'《唐律疏議》',cont:'<b>唐高宗</b>時期長孫無忌等主持編纂。中國現存<b>最早最完整的封建法典</b>。對東亞諸國（日本《大寶律令》、朝鮮、越南）法律影響深遠。',note:'中華法系的代表作',st:2},
],
};


var curCat='astro';
function sw(id){curCat=id;rT();rC();}
function rT(){var h='';for(var i=0;i<TABS.length;i++){var c=TABS[i];h+='<button class="tab'+(curCat===c.id?' on':'')+'" style="'+(curCat===c.id?'background:'+c.color:'')+'" onclick="sw(\''+c.id+'\')">'+c.n+'</button>';}document.getElementById('tabs').innerHTML=h;}
function rC(){var cat;for(var i=0;i<TABS.length;i++){if(TABS[i].id===curCat){cat=TABS[i];break;}}var items=DATA[curCat]||[];var h='<div class="cards">';for(var j=0;j<items.length;j++){var it=items[j];var stars='\u2605'.repeat(it.st);h+='<div class="card" style="background:'+cat.bg+';color:'+cat.tx+'" onclick="oM(\''+curCat+'\','+j+')">';h+='<div class="nm"><span class="star">'+stars+'</span> '+it.nm+'</div>';h+='<div class="ct">'+it.cont+'</div>';if(it.note)h+='<div class="nt">'+it.note+'</div>';h+='</div>';}h+='</div>';document.getElementById('content').innerHTML=h;}
function oM(catId,idx){var cat;for(var i=0;i<TABS.length;i++){if(TABS[i].id===catId){cat=TABS[i];break;}}var it=DATA[catId][idx];var freq=['','偶考','常考','必考高頻'][it.st];var h='<button class="cb" onclick="cM()">\u00d7</button>';h+='<h3>'+it.nm+'</h3>';h+='<span class="mt" style="background:'+cat.bg+';color:'+cat.tx+'">'+cat.n+'</span>';h+='<span class="mt" style="background:#FAEEDA;color:#633806"><span class="star">'+'\u2605'.repeat(it.st)+'</span> '+freq+'</span>';h+='<div class="row"><div class="label">\u5167\u5bb9</div><div class="val">'+it.cont+'</div></div>';if(it.note)h+='<div class="row"><div class="label">\u8003\u8a66\u5099\u8a3b</div><div class="val" style="color:#555">'+it.note+'</div></div>';document.getElementById('mc').innerHTML=h;document.getElementById('ov').className='ov show';}
function cM(){document.getElementById('ov').className='ov';}
rT();rC();

</script>
