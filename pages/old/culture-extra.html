{nm:'茶文化·酒文化',cont:'<b>茶文化</b>：<b>陸羽</b>（唐）《茶經》世界第一部茶學專著→被尊為「茶聖」。六大茶類：綠茶（不發酵，龍井）、白茶、黃茶、烏龍茶（半發酵，鐵觀音）、紅茶（全發酵）、黑茶（後發酵，普洱）。「茶馬古道」是西南地區茶葉貿易通道。<br><b>酒文化</b>：杜康被稱為「酒聖」（傳說造酒始祖）。曹操《短歌行》「何以解憂，唯有杜康」。白酒以茅台、五糧液等著名。黃酒（紹興酒）是中國最古老的酒種。',note:'陸羽茶聖＋杜康酒聖',st:2},
{nm:'中國民居',cont:'<b>北京四合院</b>：北方代表，四面房屋圍合成「口」字形，坐北朝南。體現封建家族等級（正房長輩，廂房晚輩）。<br><b>客家土樓</b>（福建）：圓形或方形巨大夯土建築，供一個家族居住。防禦功能強。2008年世界遺產。<br><b>窯洞</b>（黃土高原）：在黃土崖壁上挖掘的洞穴式住宅，冬暖夏涼。<br><b>吊腳樓</b>（西南少數民族）：臨水而建的木質樓房。<br><b>蒙古包</b>：遊牧民族的移動式住宅。',note:'四合院＝北方；土樓＝客家；窯洞＝黃土高原',st:2},

var curCat='myth';

function rT(){var h='';for(var i=0;i<TABS.length;i++){var c=TABS[i];h+='<button class="tab'+(curCat===c.id?' on':'')+'" style="'+(curCat===c.id?'background:'+c.color:'')+'" onclick="sw(\''+c.id+'\')">'+c.n+'</button>';}document.getElementById('tabs').innerHTML=h;}

rT();rC();
